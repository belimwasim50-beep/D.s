<!DOCTYPE html>
<html>
<head>
  <title>I.T.D.H - Insight Trend Data Hub</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

  <style>
    body {
      font-family: Arial;
      background: linear-gradient(135deg, #0f0f0f, #1a1a1a);
      color: white;
      text-align: center;
    }

    h1 { color: #00ffcc; }

    .card {
      background: #1e1e1e;
      padding: 20px;
      margin: 15px;
      border-radius: 15px;
      box-shadow: 0 0 10px rgba(0,255,204,0.2);
    }

    input, button {
      padding: 10px;
      margin: 5px;
      border-radius: 8px;
      border: none;
    }

    button { cursor: pointer; }

    .buy-btn {
      background: #00ffcc;
      animation: glow 1s infinite alternate;
    }

    @keyframes glow {
      from { box-shadow: 0 0 5px #00ffcc; }
      to { box-shadow: 0 0 20px #00ffcc; }
    }

    #footer {
      display: none;
      margin-top: 40px;
      padding: 20px;
      border-top: 1px solid #333;
    }
  </style>
</head>

<body>

<h1>I.T.D.H 🔥</h1>
<p>Insight Trend Data Hub – Turn trends into money 💰</p>

<!-- AUTH -->
<div class="card">
<h2>Welcome 🔐</h2>

<button onclick="showSignup()">Create Account</button>
<button onclick="showLogin()">Sign In</button>

<div id="signupBox" style="display:none;">
  <h3>Create Account</h3>
  <input type="text" id="signupUsername" placeholder="Username"><br>
  <input type="email" id="signupEmail" placeholder="Email"><br>
  <input type="password" id="signupPassword" placeholder="Password"><br>
  <button onclick="signup()">Create Account 🚀</button>
</div>

<div id="loginBox" style="display:none;">
  <h3>Sign In</h3>
  <input type="email" id="loginEmail" placeholder="Email"><br>
  <input type="password" id="loginPassword" placeholder="Password"><br>
  <button onclick="login()">Sign In 🔐</button>
</div>
</div>

<h2>Products 💰</h2>

<div class="card">
<h3>ChatGPT iPhone Prompt ⭐</h3>
<p>₹20</p>
<button class="buy-btn" onclick="buyProduct('Prompt','P1001')">Login to Buy</button>
</div>

<div class="card">
<h3>Trending Search Data PDF 🔥</h3>
<p>₹199</p>
<button class="buy-btn" onclick="buyProduct('Data PDF','P1002')">Login to Buy</button>
</div>

<div class="card">
<h3>Premium Viral Content Pack 💎</h3>
<p>₹299</p>
<button class="buy-btn" onclick="buyProduct('Premium Pack','P1003')">Login to Buy</button>
</div>

<div class="card">
<h3>Instagram Growth Guide 📈</h3>
<p>₹99</p>
<button class="buy-btn" onclick="buyProduct('Growth Guide','P1004')">Login to Buy</button>
</div>

<!-- DASHBOARD -->
<div class="card">
<h2>📊 Order Dashboard</h2>
<div id="orders"></div>
</div>

<!-- FOOTER -->
<div id="footer">
  <p>🚀 Contribute to I.T.D.H</p>
  <button onclick="openGitHub()" style="background:#00ffcc; padding:10px 20px; border-radius:10px;">
    Create Pull Request 🔥
  </button>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDDHVEWDLn75skPgf5oFZ7pkYzZMBKmX6U",
  authDomain: "trend-data-hub-database.firebaseapp.com",
  projectId: "trend-data-hub-database"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// SWITCH UI
function showSignup() {
  signupBox.style.display = "block";
  loginBox.style.display = "none";
}

function showLogin() {
  loginBox.style.display = "block";
  signupBox.style.display = "none";
}

// SIGNUP
function signup() {
  const username = signupUsername.value;
  const email = signupEmail.value;
  const password = signupPassword.value;

  auth.createUserWithEmailAndPassword(email, password)
    .then(user => {
      db.collection("users").doc(user.user.uid).set({
        username, email
      });
      localStorage.setItem("username", username);
      alert("Account created 🎉");
    })
    .catch(e => alert(e.message));
}

// LOGIN
function login() {
  const email = loginEmail.value;
  const password = loginPassword.value;

  auth.signInWithEmailAndPassword(email, password)
    .then(user => {
      db.collection("users").doc(user.user.uid).get()
      .then(doc => {
        localStorage.setItem("username", doc.data().username);
      });
      alert("Login success ✅");
      loadOrders();
    })
    .catch(e => alert(e.message));
}

// BUY + SAVE ORDER
function buyProduct(name, id) {
  const user = auth.currentUser;

  if (!user) {
    alert("Please login first 🔐");
    return;
  }

  const username = localStorage.getItem("username");

  db.collection("orders").add({
    username,
    product: name,
    productID: id,
    time: new Date()
  });

  const msg = `Hi, I'm ${username}%0AI need info on ${name}%0AProduct ID: ${id}`;
  window.open(`https://wa.me/919893975538?text=${msg}`);
}

// LOAD ORDERS
function loadOrders() {
  db.collection("orders").orderBy("time","desc")
    .onSnapshot(snapshot => {
      let html = "";
      snapshot.forEach(doc => {
        const d = doc.data();
        html += `<p>👤 ${d.username} → ${d.product} (${d.productID})</p>`;
      });
      document.getElementById("orders").innerHTML = html;
    });
}

// GITHUB BUTTON
function openGitHub() {
  window.open("https://github.com/belimwasim50-beep/D.s", "_blank");
}

// AUTH STATE
auth.onAuthStateChanged(user => {
  document.querySelectorAll(".buy-btn").forEach(btn => {
    btn.innerText = user ? "Buy Now 💰" : "Login to Buy 🔐";
  });

  if (user) {
    document.getElementById("footer").style.display = "block";
    loadOrders();
  } else {
    document.getElementById("footer").style.display = "none";
  }
});
</script>

</body>
</html>
