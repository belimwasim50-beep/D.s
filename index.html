<!DOCTYPE html>
<html>
<head>
  <title>Data Store</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

  <style>
    body { font-family: Arial; text-align: center; background: #0f0f0f; color: white; }
    input, button { padding: 10px; margin: 5px; border-radius: 8px; border: none; }
    button { background: #00ffcc; cursor: pointer; }
    .product { border: 1px solid #333; padding: 15px; margin: 10px; border-radius: 10px; }
    .buy { background: #00ffcc; animation: glow 1s infinite alternate; }
    @keyframes glow {
      from { box-shadow: 0 0 5px #00ffcc; }
      to { box-shadow: 0 0 20px #00ffcc; }
    }
  </style>
</head>

<body>

<h2>Login / Signup</h2>

<input type="text" id="username" placeholder="Username"><br>
<input type="email" id="email" placeholder="Email"><br>
<input type="password" id="password" placeholder="Password"><br>

<button onclick="signup()">Sign Up</button>
<button onclick="login()">Login</button>

<h2>Products</h2>

<div class="product">
  <h3>ChatGPT iPhone Prompt</h3>
  <p>Price: ₹20</p>
  <button class="buy" onclick="buyProduct('ChatGPT iPhone Prompt','P1001')">Buy Now</button>
</div>

<div class="product">
  <h3>Search Data Report</h3>
  <p>Price: ₹99</p>
  <button class="buy" onclick="buyProduct('Search Data Report','P1002')">Buy Now</button>
</div>

<script>
  // 🔥 YOUR FIREBASE CONFIG HERE
  const firebaseConfig = {
  apiKey: "AIzaSyDDHVEWDLn75skPgf5oFZ7pkYzZMBKmX6U",
  authDomain: "trend-data-hub-database.firebaseapp.com",
  projectId: "trend-data-hub-database",
  storageBucket: "trend-data-hub-database.firebasestorage.app",
  messagingSenderId: "967407625376",
  appId: "1:967407625376:web:927cf420b812ba9873d5c5",
  measurementId: "G-LG8DR3EPL4"
};

  firebase.initializeApp(firebaseConfig);

  const auth = firebase.auth();
  const db = firebase.firestore();

  function signup() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    const username = document.getElementById("username").value;

    auth.createUserWithEmailAndPassword(email, password)
      .then(user => {
        db.collection("users").doc(user.user.uid).set({
          username: username,
          email: email
        });

        localStorage.setItem("username", username);
        alert("Signup successful!");
      })
      .catch(err => alert(err.message));
  }

  function login() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    auth.signInWithEmailAndPassword(email, password)
      .then(user => {
        db.collection("users").doc(user.user.uid).get()
        .then(doc => {
          localStorage.setItem("username", doc.data().username);
        });

        alert("Login successful!");
      })
      .catch(err => alert(err.message));
  }

  function buyProduct(productName, productID) {
    const username = localStorage.getItem("username") || "User";

    const message = `Hi, I'm ${username}%0A%0AI need info on this product%0A${productName}%0AProduct ID: ${productID}`;

    const phone = "919893975538";

    const url = `https://wa.me/${phone}?text=${message}`;

    window.open(url, "_blank");
  }
</script>

</body>
</html>
