<!DOCTYPE html>
<html>
<head>
  <title>I.T.D.H - Premium</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

  <style>
    body {
      font-family: Arial;
      background: linear-gradient(135deg, #0f0f0f, #1a1a1a);
      color: white;
      text-align: center;
    }

    h1 { color: #00ffcc; }

    .card {
      background: #1e1e1e;
      padding: 20px;
      margin: 15px;
      border-radius: 15px;
      box-shadow: 0 0 10px rgba(0,255,204,0.2);
    }

    input, button {
      padding: 10px;
      margin: 5px;
      border-radius: 8px;
      border: none;
    }

    .buy-btn {
      background: #00ffcc;
      animation: glow 1s infinite alternate;
    }

    @keyframes glow {
      from { box-shadow: 0 0 5px #00ffcc; }
      to { box-shadow: 0 0 20px #00ffcc; }
    }

    .dashboard {
      margin-top: 30px;
      padding: 10px;
      border-top: 1px solid #333;
    }
  </style>
</head>

<body>

<h1>I.T.D.H 🔥</h1>
<p>Insight Trend Data Hub – Turn trends into money 💰</p>

<div class="card">
<h2>Login / Signup 🔐</h2>

<input type="text" id="username" placeholder="Username"><br>
<input type="email" id="email" placeholder="Email"><br>
<input type="password" id="password" placeholder="Password"><br>

<button onclick="signup()">Sign Up</button>
<button onclick="login()">Login</button>
</div>

<h2>Products 💰</h2>

<div class="card">
<h3>ChatGPT iPhone Prompt ⭐</h3>
<p>₹20</p>
<button class="buy-btn" onclick="buyProduct('Prompt','P1001')">Login to Buy</button>
</div>

<div class="card">
<h3>Trending Data PDF 🔥</h3>
<p>₹199</p>
<button class="buy-btn" onclick="buyProduct('Data PDF','P1002')">Login to Buy</button>
</div>

<div class="card">
<h3>Premium Pack 💎</h3>
<p>₹299</p>
<button class="buy-btn" onclick="buyProduct('Premium Pack','P1003')">Login to Buy</button>
</div>

<div class="card">
<h3>Growth Guide 📈</h3>
<p>₹99</p>
<button class="buy-btn" onclick="buyProduct('Growth Guide','P1004')">Login to Buy</button>
</div>

<div class="dashboard">
<h2>📊 Order Dashboard</h2>
<div id="orders"></div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDDHVEWDLn75skPgf5oFZ7pkYzZMBKmX6U",
  authDomain: "trend-data-hub-database.firebaseapp.com",
  projectId: "trend-data-hub-database"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// SIGNUP
function signup() {
  const email = emailInput.value;
  const password = passwordInput.value;
  const username = usernameInput.value;

  auth.createUserWithEmailAndPassword(email, password)
    .then(user => {
      db.collection("users").doc(user.user.uid).set({
        username, email
      });
      localStorage.setItem("username", username);
      alert("Signup done 🎉");
    })
    .catch(e => alert(e.message));
}

// LOGIN
function login() {
  auth.signInWithEmailAndPassword(emailInput.value, passwordInput.value)
    .then(user => {
      db.collection("users").doc(user.user.uid).get()
      .then(doc => {
        localStorage.setItem("username", doc.data().username);
      });
      alert("Login success ✅");
      loadOrders();
    })
    .catch(e => alert(e.message));
}

// BUY + SAVE ORDER
function buyProduct(name, id) {
  const user = auth.currentUser;

  if (!user) {
    alert("Login first 🔐");
    return;
  }

  const username = localStorage.getItem("username");

  // SAVE ORDER 🔥
  db.collection("orders").add({
    username,
    product: name,
    productID: id,
    time: new Date()
  });

  const msg = `Hi, I'm ${username}%0AI want ${name}%0AProduct ID: ${id}`;
  window.open(`https://wa.me/919893975538?text=${msg}`);
}

// LOAD ORDERS (DASHBOARD)
function loadOrders() {
  db.collection("orders").orderBy("time","desc")
    .onSnapshot(snapshot => {
      let html = "";
      snapshot.forEach(doc => {
        const d = doc.data();
        html += `<p>👤 ${d.username} → ${d.product} (${d.productID})</p>`;
      });
      document.getElementById("orders").innerHTML = html;
    });
}

// BUTTON UPDATE
auth.onAuthStateChanged(user => {
  document.querySelectorAll(".buy-btn").forEach(btn => {
    btn.innerText = user ? "Buy Now 💰" : "Login to Buy 🔐";
  });

  if(user) loadOrders();
});
</script>

</body>
</html>
